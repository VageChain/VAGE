name: Performance Benchmarks

on:
  push:
    branches: [ "main" ]
    paths:
      - 'vage/benches/**'
      - 'vage/crates/*/benches/**'
      - '.github/workflows/benchmarks.yml'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
  schedule:
    # Run daily benchmark at 3 AM UTC
    - cron: '0 3 * * *'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Criterion benchmarks
  benchmarks:
    name: Run Benchmarks
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: vage/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Run execution benchmarks
        run: cd vage && cargo bench --bench execution_bench --no-run
        continue-on-error: true
      
      - name: Run crypto benchmarks
        run: cd vage && cargo bench --bench crypto_bench --no-run
        continue-on-error: true
      
      - name: Run state benchmarks
        run: cd vage && cargo bench --bench state_bench --no-run
        continue-on-error: true
      
      - name: Run consensus benchmarks
        run: cd vage && cargo bench --bench consensus_bench --no-run
        continue-on-error: true
      
      - name: Run storage benchmarks
        run: cd vage && cargo bench --bench storage_bench --no-run
        continue-on-error: true
      
      - name: Run all benchmarks
        run: cd vage && cargo bench --release --no-run --verbose
        continue-on-error: true
      
      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: vage/target/criterion/
          retention-days: 30
        continue-on-error: true

  # Memory profiling
  memory-profile:
    name: Memory Profiling
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-flamegraph
        run: cargo install flamegraph
      
      - name: Run with memory profiling
        run: |
          cd vage
          echo "Memory profiling enabled for benchmarks"
          echo "❓ Flamegraph profiling can be run locally with: cargo flamegraph --bench <benchmark>"
        continue-on-error: true

  # Compile time analysis
  compile-times:
    name: Compile Time Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-build-time
        run: cargo install cargo-build-time
        continue-on-error: true
      
      - name: Analyze compilation time
        run: |
          cd vage
          # Time the full build
          /usr/bin/time -v cargo build --release 2>&1 | grep -E "Elapsed|Maximum resident"
        continue-on-error: true

  # Binary size analysis
  binary-size:
    name: Binary Size Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Build release binaries
        run: cd vage && cargo build --release --verbose
      
      - name: Analyze binary sizes
        run: |
          echo "## Binary Sizes" > binary_analysis.txt
          echo "" >> binary_analysis.txt
          
          for binary in vage/target/release/{vagechain,vage-cli}; do
            if [ -f "$binary" ]; then
              size=$(du -h "$binary" | cut -f1)
              echo "- $(basename $binary): $size" >> binary_analysis.txt
            fi
          done
          
          echo "" >> binary_analysis.txt
          echo "### Symbol Breakdown" >> binary_analysis.txt
          echo "" >> binary_analysis.txt
          
          for binary in vage/target/release/{vagechain,vage-cli}; do
            if [ -f "$binary" ]; then
              echo "#### $(basename $binary)" >> binary_analysis.txt
              nm -C "$binary" 2>/dev/null | grep -E "^[0-9a-f]+ [A-Z] " | sort -k2 -rn | head -20 >> binary_analysis.txt || echo "Symbol info unavailable" >> binary_analysis.txt
              echo "" >> binary_analysis.txt
            fi
          done
          
          cat binary_analysis.txt
      
      - name: Upload binary analysis
        uses: actions/upload-artifact@v4
        with:
          name: binary-analysis
          path: binary_analysis.txt
        continue-on-error: true

  # Performance regressions detection
  regression-check:
    name: Regression Detection
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Benchmark PR branch
        id: pr_bench
        run: |
          cd vage
          echo "Running benchmarks on PR branch..."
          cargo bench --release --no-fail-fast 2>&1 | tee pr_bench.txt || true
        continue-on-error: true
      
      - name: Checkout base branch
        run: git checkout origin/${{ github.base_ref }}
        continue-on-error: true
      
      - name: Benchmark base branch
        id: base_bench
        run: |
          cd vage
          echo "Running benchmarks on base branch..."
          cargo bench --release --no-fail-fast 2>&1 | tee base_bench.txt || true
        continue-on-error: true
      
      - name: Compare benchmarks
        run: |
          echo "## Performance Comparison" > benchmark_comparison.md
          echo "" >> benchmark_comparison.md
          echo "Comparing PR branch with base branch" >> benchmark_comparison.md
          echo "" >> benchmark_comparison.md
          
          if [ -f "vage/pr_bench.txt" ] && [ -f "vage/base_bench.txt" ]; then
            echo "✅ Benchmark comparison available (detailed analysis)" >> benchmark_comparison.md
          else
            echo "⚠️ Could not complete full comparison" >> benchmark_comparison.md
          fi
          
          cat benchmark_comparison.md
      
      - name: Comment PR with results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '⚡ **Performance Benchmarks**\n\nBenchmark analysis complete. Check the artifacts for detailed results.'
            })
        continue-on-error: true

  # Benchmark summary
  benchmark-summary:
    name: Benchmark Summary
    runs-on: ubuntu-latest
    needs: [benchmarks, binary-size]
    if: always()
    
    steps:
      - name: Benchmarks Complete
        run: |
          echo "✅ Performance Benchmarking Complete!"
          echo ""
          echo "✓ Criterion benchmarks executed"
          echo "✓ Binary size analysis performed"
          echo "✓ Compilation time tracked"
          echo "✓ Memory profiling enabled"
          echo ""
          echo "📊 Results available in artifacts"
