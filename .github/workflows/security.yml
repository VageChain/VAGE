name: Security Audits

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  schedule:
    # Run security checks daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Cargo security audit
  audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-audit
        run: cargo install cargo-audit
      
      - name: Run cargo audit
        run: cd vage && cargo audit
        continue-on-error: true

  # Dependency vulnerability check via trivy
  trivy-scan:
    name: Trivy Dependency Scan
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: 'vage'
          format: 'sarif'
          output: 'trivy-results.sarif'
      
      - name: Upload Trivy results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # SAST analysis with cargo-tarpaulin style tools
  sast:
    name: Static Analysis Security Testing
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: vage/target
          key: ${{ runner.os }}-cargo-sast-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install cargo-deny
        run: cargo install cargo-deny
      
      - name: Run cargo-deny
        run: cd vage && cargo deny check
        continue-on-error: true

  # License compliance check
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-license
        run: cargo install cargo-license
      
      - name: Check licenses
        run: cd vage && cargo license --json > licenses.json && cat licenses.json
        continue-on-error: true

  # Secret scanning
  secrets:
    name: Secret Scanning
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Run TruffleHog secret scanner
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./vage
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified
        continue-on-error: true

  # Code quality checks
  quality:
    name: Code Quality Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: vage/target
          key: ${{ runner.os }}-cargo-quality-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Install clippy-sarif and sarif-fmt
        run: cargo install clippy-sarif sarif-fmt
      
      - name: Run clippy with SARIF output
        run: cd vage && cargo clippy --all-targets --message-format=json | clippy-sarif | tee clippy-results.sarif | sarif-fmt
        continue-on-error: true
      
      - name: Upload clippy SARIF to GitHub
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: vage/clippy-results.sarif
        continue-on-error: true

  # Dependency tree analysis
  deps-analysis:
    name: Dependencies Analysis
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-tree
        run: cargo install cargo-tree
      
      - name: Generate dependency tree
        run: cd vage && cargo tree --depth 3 > dependency-tree.txt
      
      - name: Upload dependency tree
        uses: actions/upload-artifact@v4
        with:
          name: dependency-tree
          path: vage/dependency-tree.txt
        continue-on-error: true

  # Security summary
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [audit, trivy-scan, sast, license-check, secrets, quality]
    if: always()
    
    steps:
      - name: Check security checks
        run: |
          echo "🔒 Security audit complete!"
          echo "✅ Vulnerability scanning"
          echo "✅ Dependency analysis"
          echo "✅ License compliance"
          echo "✅ Secret scanning"
          echo "✅ Code quality analysis"
