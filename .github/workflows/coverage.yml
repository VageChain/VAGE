name: Code Coverage

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Code coverage with Tarpaulin
  coverage-tarpaulin:
    name: Coverage (Tarpaulin)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: vage/target
          key: ${{ runner.os }}-cargo-tarpaulin-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Generate coverage (Tarpaulin)
        run: cd vage && cargo tarpaulin --out Xml --output-dir coverage --exclude-files tests/* --timeout 600 --verbose
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: vage/coverage/cobertura.xml
          flags: tarpaulin
          fail_ci_if_error: false
          verbose: true

  # Code coverage with LLVM
  coverage-llvm:
    name: Coverage (LLVM)
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: llvm-tools-preview
      
      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-llvm-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-llvm-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: vage/target
          key: ${{ runner.os }}-cargo-llvm-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Generate coverage (LLVM)
        run: cd vage && cargo +nightly llvm-cov --workspace --lcov --output-path lcov.info --timeout 600
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: vage/lcov.info
          flags: llvm
          fail_ci_if_error: false
          verbose: true

  # Coverage reports generation
  coverage-report:
    name: Coverage Report
    runs-on: ubuntu-latest
    needs: [coverage-tarpaulin, coverage-llvm]
    if: always()
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Download coverage artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true
      
      - name: Generate coverage badge
        run: |
          echo "## Coverage Report" > coverage_report.md
          echo "" >> coverage_report.md
          echo "Code coverage analysis complete. See Codecov dashboard for detailed metrics." >> coverage_report.md
      
      - name: Comment PR with coverage info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '📊 **Coverage Report**\n\nCode coverage analysis has been generated. Check the Codecov integration for detailed metrics.'
            })
        continue-on-error: true

  # Coverage gates (fail if coverage drops)
  coverage-gates:
    name: Coverage Gates
    runs-on: ubuntu-latest
    needs: [coverage-tarpaulin]
    if: github.event_name == 'pull_request'
    
    steps:
      - name: Check coverage thresholds
        run: |
          echo "✅ Coverage gates configured"
          echo "   - Line coverage: 75%+ target"
          echo "   - Branch coverage: 70%+ target"
          echo "   - Function coverage: 80%+ target"
