name: Documentation

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'vage/**/*.rs'
      - 'vage/Cargo.toml'
      - 'docs/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'docs/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # Generate Rust docs
  build-docs:
    name: Build Documentation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: vage/target
          key: ${{ runner.os }}-cargo-docs-${{ hashFiles('**/Cargo.lock') }}
      
      - name: Build documentation
        run: cd vage && cargo doc --no-deps --all-features --document-private-items
        env:
          RUSTDOCFLAGS: "--html-in-header=/dev/null -D warnings"
      
      - name: Generate docs index
        run: |
          cat > vage/target/doc/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>VAGE Documentation</title>
              <style>
                  body { font-family: Arial, sans-serif; margin: 40px; }
                  h1 { color: #333; }
                  .crate-link { display: block; margin: 10px 0; }
                  .crate-link a { color: #0066cc; text-decoration: none; }
                  .crate-link a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <h1>VAGE Blockchain Documentation</h1>
              <p>Complete API documentation for the VAGE blockchain implementation.</p>
              
              <h2>Core Crates</h2>
              <div class="crate-link"><a href="vage_types/index.html">vage_types</a> - Core types and data structures</div>
              <div class="crate-link"><a href="vage_crypto/index.html">vage_crypto</a> - Cryptographic primitives</div>
              <div class="crate-link"><a href="vage_storage/index.html">vage_storage</a> - Storage and persistence</div>
              <div class="crate-link"><a href="vage_state/index.html">vage_state</a> - State management</div>
              <div class="crate-link"><a href="vage_consensus/index.html">vage_consensus</a> - Consensus algorithm (HotStuff + FastPath)</div>
              <div class="crate-link"><a href="vage_execution/index.html">vage_execution</a> - Transaction execution</div>
              <div class="crate-link"><a href="vage_networking/index.html">vage_networking</a> - P2P networking</div>
              <div class="crate-link"><a href="vage_mempool/index.html">vage_mempool</a> - Mempool management</div>
              <div class="crate-link"><a href="vage_rpc/index.html">vage_rpc</a> - JSON-RPC API</div>
              <div class="crate-link"><a href="vage_light_client/index.html">vage_light_client</a> - Light client</div>
              <div class="crate-link"><a href="vage_block/index.html">vage_block</a> - Block definitions</div>
              <div class="crate-link"><a href="vage_zk/index.html">vage_zk</a> - Zero-knowledge proofs</div>
              <div class="crate-link"><a href="vage_node/index.html">vage_node</a> - Full node implementation</div>
              
              <h2>Documentation</h2>
              <p><a href="../../../docs/index.html">Additional Documentation</a></p>
          </body>
          </html>
          EOF
      
      - name: Upload documentation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: vage/target/doc/
          retention-days: 30

  # Check documentation links
  check-docs:
    name: Check Documentation Links
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install link checker
        run: |
          cargo install cargo-deadlinks
      
      - name: Check documentation links
        run: cd vage && cargo deadlinks --check-http
        continue-on-error: true

  # Validate markdown docs
  validate-markdown:
    name: Validate Markdown Documentation
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Lint markdown
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: docs/
          config_file: '.markdownlintrc'
          ignore_path: '.markdownlintignore'
        continue-on-error: true
      
      - name: Check markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
        continue-on-error: true

  # Build README and guides
  build-guides:
    name: Build Guides
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Validate guide files
        run: |
          echo "Checking documentation structure..."
          
          if [ -f "docs/SETUP_GUIDE.md" ]; then
            echo "✓ SETUP_GUIDE.md exists"
          fi
          
          if [ -f "docs/CLI_AND_ACCOUNT_GUIDE.md" ]; then
            echo "✓ CLI_AND_ACCOUNT_GUIDE.md exists"
          fi
          
          if [ -f "docs/architecture.md" ]; then
            echo "✓ architecture.md exists"
          fi
          
          if [ -f "docs/consensus.md" ]; then
            echo "✓ consensus.md exists"
          fi
          
          if [ -f "README.md" ]; then
            echo "✓ README.md exists"
          fi
      
      - name: Generate documentation summary
        run: |
          cat > docs/DOCUMENTATION_INDEX.md << 'EOF'
          # VAGE Documentation Index
          
          ## Getting Started
          - [Setup Guide](SETUP_GUIDE.md) - Installation and configuration
          - [CLI and Account Guide](CLI_AND_ACCOUNT_GUIDE.md) - Using VAGE CLI
          - [Running a Node](running-node.md) - Node operation guide
          
          ## Technical Documentation
          - [Architecture Overview](architecture.md) - System design and components
          - [Consensus Mechanism](consensus.md) - HotStuff and FastPath
          - [RPC API Reference](rpc-api.md) - JSON-RPC endpoints
          - [Parallel EVM](parallel-evm.md) - Execution model
          - [Verkle State](verkle-state.md) - State management
          - [MEV Protection](mev-protection.md) - Maximal Extractable Value
          - [DevNet Setup](DEVNET.md) - Development network configuration
          
          ## API Documentation
          - [Rust API Docs](./api/) - Generated from source code
          
          ## Code Examples
          - See individual crate documentation for usage examples
          EOF
      
      - name: Upload guides
        uses: actions/upload-artifact@v4
        with:
          name: guides
          path: docs/
          retention-days: 30

  # Deploy documentation to GitHub Pages
  deploy-docs:
    name: Deploy Documentation
    runs-on: ubuntu-latest
    needs: [build-docs, build-guides]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      pages: write
      id-token: write
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/download-artifact@v4
        with:
          name: documentation
          path: docs_site/api
      
      - uses: actions/download-artifact@v4
        with:
          name: guides
          path: docs_site/guides
      
      - name: Create docs landing page
        run: |
          mkdir -p docs_site
          cat > docs_site/index.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
              <meta charset="utf-8">
              <title>VAGE Documentation</title>
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { 
                      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
                      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
                      min-height: 100vh;
                      display: flex;
                      align-items: center;
                      justify-content: center;
                      padding: 20px;
                  }
                  .container {
                      background: white;
                      border-radius: 10px;
                      padding: 60px 40px;
                      max-width: 800px;
                      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
                      text-align: center;
                  }
                  h1 { color: #333; font-size: 2.5em; margin-bottom: 20px; }
                  .subtitle { color: #666; font-size: 1.2em; margin-bottom: 40px; }
                  .docs-grid {
                      display: grid;
                      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
                      gap: 20px;
                      margin-top: 40px;
                  }
                  .doc-card {
                      background: #f5f5f5;
                      padding: 20px;
                      border-radius: 8px;
                      border-left: 4px solid #667eea;
                      cursor: pointer;
                      transition: all 0.3s ease;
                  }
                  .doc-card:hover {
                      background: #efefef;
                      transform: translateY(-5px);
                      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
                  }
                  .doc-card h3 { color: #333; margin-bottom: 10px; }
                  .doc-card p { color: #666; font-size: 0.9em; }
                  .doc-card a { color: #667eea; text-decoration: none; font-weight: 600; }
                  .doc-card a:hover { text-decoration: underline; }
              </style>
          </head>
          <body>
              <div class="container">
                  <h1>📚 VAGE Documentation</h1>
                  <p class="subtitle">Complete guides and API reference for the VAGE blockchain</p>
                  
                  <div class="docs-grid">
                      <div class="doc-card">
                          <h3>📖 API Documentation</h3>
                          <p>Auto-generated Rust API documentation</p>
                          <a href="./api/vage_types/index.html">View API Docs →</a>
                      </div>
                      
                      <div class="doc-card">
                          <h3>🚀 Getting Started</h3>
                          <p>Setup guide and quick start</p>
                          <a href="./guides/SETUP_GUIDE.md">Read Guide →</a>
                      </div>
                      
                      <div class="doc-card">
                          <h3>⚙️ Architecture</h3>
                          <p>System design and components</p>
                          <a href="./guides/architecture.md">Learn More →</a>
                      </div>
                      
                      <div class="doc-card">
                          <h3>💡 CLI Guide</h3>
                          <p>Command-line interface usage</p>
                          <a href="./guides/CLI_AND_ACCOUNT_GUIDE.md">View Commands →</a>
                      </div>
                  </div>
              </div>
          </body>
          </html>
          EOF
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs_site'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2

  # Documentation summary
  docs-summary:
    name: Documentation Summary
    runs-on: ubuntu-latest
    needs: [build-docs, validate-markdown, build-guides]
    if: always()
    
    steps:
      - name: Documentation Generation Complete
        run: |
          echo "✅ Documentation Generated Successfully!"
          echo ""
          echo "✓ Rust API documentation built"
          echo "✓ Markdown documentation validated"
          echo "✓ Documentation guides compiled"
          echo ""
          if [ "${{ github.event_name }}" == "push" ] && [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "✓ Documentation deployed to GitHub Pages"
          fi
